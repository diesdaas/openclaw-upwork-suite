version: '3.8'
services:
  orchestrator:
    build:
      context: .
      dockerfile: apps/orchestrator/Dockerfile
    environment:
      - DATA_DIR=/app/state
      - NODE_ENV=production
      - DATABASE_PATH=/app/state/state.sqlite
    volumes:
      - orchestrator-state:/app/state
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scout-agent:
    build:
      context: .
      dockerfile: apps/scout-agent/Dockerfile
    environment:
      - DATABASE_URL=sqlite:///app/state/state.sqlite
    volumes:
      - orchestrator-state:/app/state:ro
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  client-agent:
    build:
      context: .
      dockerfile: apps/client-agent/Dockerfile
    restart: unless-stopped

  review-agent:
    build:
      context: .
      dockerfile: apps/review-agent/Dockerfile
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=upwork_suite
      - POSTGRES_USER=upwork
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upwork -d upwork_suite"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

secrets:
  postgres_password:
    file: infra/docker/secrets/postgres_password.txt

volumes:
  orchestrator-state:
  postgres-data:
  redis-data:

networks:
  default:
    name: suite-internal
